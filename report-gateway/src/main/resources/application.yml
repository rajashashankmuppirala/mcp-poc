server:
  port: 8080

# Spring Cloud Gateway routes
spring:
  cloud:
    gateway:
      routes:
        # Serve index.html at root
        - id: static-index
          uri: forward:/
          predicates:
            - Path=/
          filters:
            - RewritePath=/, /index.html

# MCP Client connections — multiple servers
mcp:
  client:
    servers:
      reports:
        url: ${MCP_SERVER_URL:http://localhost:8081}
        name: "Reports MCP Server"
        skills: [report_analyst]
      ops:
        url: ${OPS_MCP_SERVER_URL:http://localhost:8083}
        name: "Operations MCP Server"
        skills: [operations_monitor]
    request-timeout: 60s
    initialization-timeout: 30s

# LLM Provider configuration
#
# Supported providers:
#   mock             — keyword-based fake provider (for testing)
#   openai-compatible — Any OpenAI Chat Completions API compatible endpoint:
#     - OpenAI:        endpoint=https://api.openai.com/v1, model=gpt-4o
#     - MiniMax:       endpoint=https://api.minimax.chat/v1, model=MiniMax-M2
#     - Ollama:        endpoint=http://localhost:11434/v1, model=llama3
#     - Groq:          endpoint=https://api.groq.com/openai/v1, model=llama-3.1-70b
#     - OpenRouter:    endpoint=https://openrouter.ai/api/v1, model=anthropic/claude-sonnet-4-20250514
#
llm:
  provider: ${LLM_PROVIDER:mock}
  fallback-message: ${LLM_FALLBACK_MESSAGE:Sorry, I cannot help with this request.}
  openai:
    endpoint: ${LLM_ENDPOINT:https://api.openai.com/v1}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:gpt-4o}

# Skills configuration — directory of Markdown files with frontmatter
skills:
  config-dir: classpath:skills/*.md

logging:
  level:
    com.example.gateway: DEBUG
    org.springframework.ai: DEBUG
    AUDIT: INFO
