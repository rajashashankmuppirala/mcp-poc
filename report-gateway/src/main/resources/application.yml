server:
  port: 8080

# Spring Cloud Gateway routes
spring:
  cloud:
    gateway:
      routes:
        # Serve index.html at root
        - id: static-index
          uri: forward:/
          predicates:
            - Path=/
          filters:
            - RewritePath=/, /index.html

# MCP Client connections — multiple servers
mcp:
  client:
    servers:
      reports:
        url: ${MCP_SERVER_URL:http://localhost:8081}
        name: "Reports MCP Server"
        skills: [report_analyst]
      ops:
        url: ${OPS_MCP_SERVER_URL:http://localhost:8083}
        name: "Operations MCP Server"
        skills: [operations_monitor]
    request-timeout: 60s
    initialization-timeout: 30s

# LLM Provider configuration
llm:
  provider: ${LLM_PROVIDER:mock}
  fallback-message: ${LLM_FALLBACK_MESSAGE:Sorry, I cannot help with this request.}
  azure:
    endpoint: ${AZURE_OPENAI_ENDPOINT:http://localhost:9999}
    api-key: ${AZURE_OPENAI_API_KEY:test-key}
    deployment: ${AZURE_OPENAI_DEPLOYMENT:gpt-4o-mini}
    api-version: "2024-06-01"

# Skills configuration — directory of Markdown files with frontmatter
skills:
  config-dir: classpath:skills/*.md

logging:
  level:
    com.example.gateway: DEBUG
    org.springframework.ai: DEBUG
    AUDIT: INFO
