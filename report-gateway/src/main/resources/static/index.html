<!DOCTYPE html>
<html lang="en">
<head>
<!-- v4 session-support -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Generator — POC</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --border: #334155;
    --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8;
    --user-bubble: #1d4ed8; --bot-bubble: #1e293b;
    --mono: 'SF Mono', 'Fira Code', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

  header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header .badge { font-size: 11px; background: #065f46; color: #6ee7b7; padding: 2px 8px; border-radius: 99px; }
  header #status { margin-left: auto; font-size: 12px; color: var(--muted); }
  header #status.connected { color: #6ee7b7; }
  header #status.disconnected { color: #f87171; }

  #session-controls { display: flex; gap: 8px; margin-left: 12px; }
  #session-controls button {
    font-size: 11px; background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); padding: 4px 12px; border-radius: 6px; cursor: pointer;
  }
  #session-controls button:hover { border-color: var(--accent); color: var(--text); }

  #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }

  .message { max-width: 800px; width: 100%; display: flex; flex-direction: column; gap: 4px; }
  .message.user { align-self: flex-end; align-items: flex-end; }
  .message.bot { align-self: flex-start; align-items: flex-start; }

  .bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; max-width: 100%; word-break: break-word; }
  .message.user .bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; }
  .message.bot .bubble { background: var(--bot-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .message.bot .bubble pre { background: #0f172a; padding: 12px; border-radius: 8px; overflow-x: auto; margin-top: 8px; font-family: var(--mono); font-size: 12px; max-height: 300px; overflow-y: auto; }

  .chart-container { width: 100%; min-height: 350px; background: #0f172a; border-radius: 8px; margin-top: 8px; padding: 8px; }

  .meta { font-size: 11px; color: var(--muted); }
  .cursor { display: inline-block; width: 8px; height: 16px; background: var(--accent); animation: blink 0.8s infinite; vertical-align: middle; margin-left: 4px; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  #input-area { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
  #prompt { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; color: var(--text); font-size: 14px; resize: none; font-family: inherit; outline: none; }
  #prompt:focus { border-color: var(--accent); }
  #send { background: var(--accent); color: #0f172a; border: none; padding: 0 24px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
  #send:disabled { opacity: 0.4; cursor: not-allowed; }
  #send:hover:not(:disabled) { filter: brightness(1.1); }

  /* History Panel */
  #history-panel {
    position: fixed; top: 0; right: -400px; width: 400px; height: 100vh;
    background: var(--surface); border-left: 1px solid var(--border);
    transition: right 0.3s ease; z-index: 100; display: flex; flex-direction: column;
  }
  #history-panel.open { right: 0; }
  #history-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  #history-header h3 { font-size: 16px; font-weight: 600; }
  #history-header button { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
  #history-header button:hover { color: var(--text); }
  #history-content { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .history-turn { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .history-turn:last-child { border-bottom: none; }
  .history-turn-number { font-size: 11px; color: var(--accent); margin-bottom: 4px; }
  .history-prompt { font-size: 13px; color: var(--text); margin-bottom: 4px; }
  .history-meta { font-size: 11px; color: var(--muted); }
  #history-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 99; }
  #history-overlay.open { display: block; }

  /* Session info badge */
  #session-info { font-size: 11px; color: var(--muted); margin-left: 8px; }
</style>
</head>
<body>

<header>
  <h1>Report Generator</h1>
  <span class="badge">POC</span>
  <span id="session-info"></span>
  <div id="session-controls">
    <button id="btn-history">History</button>
    <button id="btn-clear">Clear</button>
  </div>
  <span id="status" class="disconnected">Disconnected</span>
</header>

<div id="chat"></div>

<div id="input-area">
  <textarea id="prompt" rows="1" placeholder='Ask for a report (e.g. "Show me revenue by product for Q1"), a chart (e.g. "Bar chart of revenue by region"), or "Download revenue report"...' autofocus></textarea>
  <button id="send">Send</button>
</div>

<!-- History Panel -->
<div id="history-overlay"></div>
<div id="history-panel">
  <div id="history-header">
    <h3>Conversation History</h3>
    <button id="btn-close-history">&times;</button>
  </div>
  <div id="history-content">
    <div id="history-empty" style="text-align: center; color: var(--muted); padding: 40px 0;">No conversation history yet</div>
  </div>
</div>

<script>
(function() {
  'use strict';

  var chartEmbedKeywords = ['bar chart', 'line chart', 'pie chart', 'area chart', 'scatter plot', 'chart of', 'a chart', 'the chart', 'create chart', 'create a chart', 'generate chart', 'graph of', 'plot of', 'visualize', 'visualization', 'breakdown', 'dashboard'];

  var chatEl = document.getElementById('chat');
  var promptEl = document.getElementById('prompt');
  var sendBtn = document.getElementById('send');
  var statusEl = document.getElementById('status');
  var sessionInfoEl = document.getElementById('session-info');
  var historyPanel = document.getElementById('history-panel');
  var historyOverlay = document.getElementById('history-overlay');
  var historyContent = document.getElementById('history-content');
  var historyEmpty = document.getElementById('history-empty');
  var vegaScriptsLoaded = false;

  // Session state
  var sessionId = null;

  // Try to restore session from cookie on page load
  function getCookie(name) {
    var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? match[2] : null;
  }

  function setCookie(name, value, maxAge) {
    var expires = maxAge ? '; max-age=' + maxAge : '';
    document.cookie = name + '=' + value + '; path=/' + expires;
  }

  function initSession() {
    var stored = getCookie('session-id');
    if (stored) {
      sessionId = stored;
      updateSessionInfo();
      checkSessionStatus();
    }
  }

  function updateSessionInfo() {
    if (sessionId) {
      sessionInfoEl.textContent = 'Session: ' + sessionId.substring(0, 8) + '...';
    } else {
      sessionInfoEl.textContent = '';
    }
  }

  function updateSessionFromResponse(response) {
    var newSessionId = response.headers.get('X-Session-ID');
    if (newSessionId && newSessionId !== sessionId) {
      sessionId = newSessionId;
      setCookie('session-id', sessionId, 1800); // 30 minutes
      updateSessionInfo();
    }
  }

  function checkSessionStatus() {
    if (!sessionId) return;
    fetch('/session/status', {
      headers: { 'X-Session-ID': sessionId },
      signal: AbortSignal.timeout(5000)
    }).then(function(r) {
      return r.json();
    }).then(function(data) {
      if (!data.active && sessionId) {
        // Session expired, clear it
        sessionId = null;
        setCookie('session-id', '', 0);
        updateSessionInfo();
      }
    }).catch(function() {
      // Ignore errors
    });
  }

  function createEl(tag, className, parent) {
    var el = document.createElement(tag);
    el.className = className;
    if (parent) parent.appendChild(el);
    return el;
  }

  function isChartPrompt(text) {
    var lower = text.toLowerCase();
    return chartEmbedKeywords.some(function(kw) { return lower.indexOf(kw) !== -1; });
  }

  // History panel functions
  function openHistoryPanel() {
    loadHistory();
    historyPanel.classList.add('open');
    historyOverlay.classList.add('open');
  }

  function closeHistoryPanel() {
    historyPanel.classList.remove('open');
    historyOverlay.classList.remove('open');
  }

  function loadHistory() {
    if (!sessionId) {
      historyEmpty.textContent = 'No active session';
      historyEmpty.style.display = 'block';
      return;
    }

    historyEmpty.textContent = 'Loading...';
    historyEmpty.style.display = 'block';

    fetch('/session/history', {
      headers: { 'X-Session-ID': sessionId },
      signal: AbortSignal.timeout(5000)
    }).then(function(r) {
      if (!r.ok) throw new Error('Failed to load history');
      return r.json();
    }).then(function(data) {
      renderHistory(data);
    }).catch(function(err) {
      historyEmpty.textContent = 'Error loading history: ' + err.message;
      historyEmpty.style.display = 'block';
    });
  }

  function renderHistory(data) {
    // Clear existing content except empty message
    while (historyContent.firstChild && historyContent.firstChild !== historyEmpty) {
      historyContent.removeChild(historyContent.firstChild);
    }

    if (!data.turns || data.turns.length === 0) {
      historyEmpty.textContent = 'No conversation history yet';
      historyEmpty.style.display = 'block';
      return;
    }

    historyEmpty.style.display = 'none';

    // Add summary at top
    var summary = createEl('div', '', historyContent);
    summary.style.cssText = 'font-size: 12px; color: var(--muted); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border);';
    summary.textContent = data.turnCount + ' turns · Created ' + new Date(data.createdAt).toLocaleString();
    historyContent.insertBefore(summary, historyEmpty);

    // Add turns in reverse order (newest first)
    for (var i = data.turns.length - 1; i >= 0; i--) {
      var turn = data.turns[i];
      var turnEl = createEl('div', 'history-turn', historyContent);
      historyContent.insertBefore(turnEl, historyEmpty);

      var num = createEl('div', 'history-turn-number', turnEl);
      num.textContent = 'Turn #' + turn.turnNumber;

      var prompt = createEl('div', 'history-prompt', turnEl);
      prompt.textContent = turn.userPrompt;

      var meta = createEl('div', 'history-meta', turnEl);
      var metaText = [];
      if (turn.responseType) metaText.push(turn.responseType);
      if (turn.chartType) metaText.push(turn.chartType + ' chart');
      if (turn.extractedFilters && turn.extractedFilters.reportType) {
        metaText.push(turn.extractedFilters.reportType);
      }
      meta.textContent = metaText.join(' · ') + ' · ' + new Date(turn.timestamp).toLocaleTimeString();
    }
  }

  function clearSession() {
    if (!sessionId) {
      alert('No active session to clear');
      return;
    }

    if (!confirm('Clear all conversation history? This cannot be undone.')) {
      return;
    }

    fetch('/session/clear', {
      method: 'POST',
      headers: { 'X-Session-ID': sessionId },
      signal: AbortSignal.timeout(5000)
    }).then(function(r) {
      return r.json();
    }).then(function(data) {
      if (data.cleared) {
        sessionId = null;
        setCookie('session-id', '', 0);
        updateSessionInfo();
        chatEl.innerHTML = '';
        alert('Conversation history cleared');
      }
    }).catch(function(err) {
      alert('Error clearing session: ' + err.message);
    });
  }

  // Dynamically load Vega + Vega-Embed from CDN
  function loadVegaScripts() {
    if (vegaScriptsLoaded) return Promise.resolve();
    return new Promise(function(resolve, reject) {
      var scripts = [
        'https://cdn.jsdelivr.net/npm/vega@5',
        'https://cdn.jsdelivr.net/npm/vega-lite@5',
        'https://cdn.jsdelivr.net/npm/vega-embed@6'
      ];
      var loaded = 0;

      function loadScript(url) {
        return new Promise(function(res, rej) {
          var s = document.createElement('script');
          s.src = url;
          s.onload = res;
          s.onerror = function() { rej(new Error('Failed to load ' + url)); };
          document.head.appendChild(s);
        });
      }

      function loadNext() {
        if (loaded >= scripts.length) {
          vegaScriptsLoaded = true;
          resolve();
          return;
        }
        loadScript(scripts[loaded]).then(function() {
          loaded++;
          loadNext();
        }).catch(function(err) {
          reject(err);
        });
      }
      loadNext();
    });
  }

  // Check connectivity
  function checkStatus() {
    fetch('/ai/status', {
      signal: AbortSignal.timeout(3000)
    }).then(function(r) {
      return r.json();
    }).then(function(data) {
      if (data.status === 'ok') {
        statusEl.textContent = 'Connected';
        statusEl.className = 'connected';
      } else {
        throw new Error('not ok');
      }
    }).catch(function() {
      statusEl.textContent = 'Disconnected';
      statusEl.className = 'disconnected';
    });
  }

  function addUserMessage(text) {
    var msg = createEl('div', 'message user', chatEl);
    var bubble = createEl('div', 'bubble', msg);
    bubble.textContent = text;
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function addBotMessage() {
    var msg = createEl('div', 'message bot', chatEl);
    var bubble = createEl('div', 'bubble', msg);
    var pre = createEl('pre', '', bubble);
    var cursor = createEl('span', 'cursor', bubble);
    chatEl.scrollTop = chatEl.scrollHeight;
    return { pre: pre, cursor: cursor, msg: msg, bubble: bubble };
  }

  // Parse SSE event: extract data from "data:<payload>" or "data: <payload>" lines
  function parseSSE(rawText) {
    var lines = rawText.split('\n');
    var dataLines = [];
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (line.indexOf('data:') === 0) {
        var payload = line.length > 5 ? line.substring(5) : '';
        if (payload.charAt(0) === ' ') payload = payload.substring(1);
        if (payload.trim()) dataLines.push(payload);
      }
    }
    return dataLines;
  }

  // Display an error response as a friendly bot message (not raw JSON)
  function showBotError(ui, response, fallback) {
    ui.pre.remove();
    ui.cursor.remove();
    var msg = createEl('div', '', ui.bubble);
    msg.style.color = '#f87171';
    msg.style.lineHeight = '1.5';
    msg.textContent = fallback || 'Something went wrong. Please try again.';
    sendBtn.disabled = false;
    promptEl.focus();
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  // Reusable error handler: parse JSON response and show friendly message.
  // Does NOT consume the body — caller must not call response.text()/json() after this.
  function handleErrorResponse(ui, response, defaultMsg) {
    if (!response.ok) {
      // Parse error from JSON body if available, otherwise use default
      var msg = defaultMsg || 'Something went wrong. Please try again.';
      try {
        // Clone response so we can peek at body without consuming it for callers
        response.clone().json().then(function(err) {
          if (err && err.message) msg = err.message;
          showBotError(ui, response, msg);
        }).catch(function() {
          showBotError(ui, response, msg);
        });
      } catch (e) {
        showBotError(ui, response, msg);
      }
      // Return a rejected promise to stop the calling chain from continuing
      return Promise.reject(new Error('__handled__'));
    }
    return null;
  }

  function sendPrompt() {
    var text = promptEl.value.trim();
    if (!text) return;
    promptEl.value = '';
    promptEl.style.height = 'auto';
    sendBtn.disabled = true;
    addUserMessage(text);

    var isDownload = text.toLowerCase().indexOf('download') !== -1;

    if (isDownload) {
      sendAsDownload(text);
    } else if (isChartPrompt(text)) {
      sendAsChart(text);
    } else {
      sendAsStream(text);
    }
  }

  // Chart mode: POST /ai/chart → parse JSON → render Vega-Lite spec
  function sendAsChart(text) {
    var ui = addBotMessage();
    ui.pre.textContent = 'Generating chart...';

    var headers = { 'Content-Type': 'application/json' };
    if (sessionId) headers['X-Session-ID'] = sessionId;

    fetch('/ai/chart', {
      method: 'POST',
      headers: headers,
      body: JSON.stringify({ prompt: text })
    }).then(function(response) {
      updateSessionFromResponse(response);
      if (!response.ok) {
        return handleErrorResponse(ui, response, 'I couldn\'t generate a chart for that request. Try specifying a chart type — for example, "pie chart of revenue by region."');
      }
      return response.json().then(function(data) {
        // Check if this is a clarification request
        if (data.type === 'chart_type' && data.options) {
          ui.pre.remove();
          ui.cursor.remove();
          showClarificationDialog(ui, data, text);
          return;
        }
        renderChart(ui, data, sendBtn);
      });
    }).catch(function(err) {
      ui.pre.textContent = 'Connection error: ' + err.message;
      ui.cursor.remove();
      sendBtn.disabled = false;
      promptEl.focus();
    });
  }

  // Render a Vega-Lite chart spec in the UI
  function renderChart(ui, data, sendBtn) {
    ui.pre.remove();
    ui.cursor.remove();

    var chartDiv = createEl('div', 'chart-container', ui.bubble);
    chartDiv.id = 'chart-' + Date.now();

    var spec;
    try {
      spec = typeof data.vegaLiteSpec === 'string'
        ? JSON.parse(data.vegaLiteSpec)
        : data.vegaLiteSpec;
    } catch (e) {
      ui.pre.textContent = 'I couldn\'t generate a valid chart. Try a different chart type or data request.';
      sendBtn.disabled = false;
      return;
    }

    loadVegaScripts().then(function() {
      var opts = {
        renderer: 'canvas',
        actions: { export: true, source: false, compiled: false, editor: false }
      };

      vegaEmbed(chartDiv, spec, opts).then(function() {
        var meta = createEl('div', 'meta', ui.msg);
        meta.textContent = data.title + ' (' + data.chartType + ')';
        sendBtn.disabled = false;
        promptEl.focus();
        chatEl.scrollTop = chatEl.scrollHeight;
      }).catch(function(err) {
        ui.pre.textContent = 'I couldn\'t render that chart. Please try a different visualization.';
        sendBtn.disabled = false;
      });
    }).catch(function(err) {
      ui.pre.textContent = 'The chart library couldn\'t load. Please refresh the page and try again.';
      sendBtn.disabled = false;
    });
  }

  // Show interactive chart type selector when user prompt is ambiguous
  function showClarificationDialog(ui, data, originalPrompt) {
    var question = createEl('div', '', ui.bubble);
    question.style.fontWeight = '600';
    question.style.marginBottom = '12px';
    question.textContent = data.question;

    var optionsDiv = createEl('div', '', ui.bubble);
    optionsDiv.style.display = 'flex';
    optionsDiv.style.gap = '8px';
    optionsDiv.style.flexWrap = 'wrap';
    optionsDiv.style.marginBottom = '8px';

    for (var i = 0; i < data.options.length; i++) {
      (function(opt) {
        var btn = document.createElement('button');
        btn.textContent = opt.label;
        btn.style.cssText = 'padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 13px; transition: all 0.15s;';
        btn.onmouseover = function() { btn.style.borderColor = 'var(--accent)'; btn.style.background = '#0c4a6e'; };
        btn.onmouseout = function() { btn.style.borderColor = 'var(--border)'; btn.style.background = 'var(--surface)'; };
        btn.onclick = function() {
          // Disable all buttons
          var allBtns = optionsDiv.querySelectorAll('button');
          for (var j = 0; j < allBtns.length; j++) {
            allBtns[j].disabled = true;
            allBtns[j].style.opacity = '0.4';
          }
          btn.style.opacity = '1';
          btn.style.borderColor = 'var(--accent)';
          btn.style.background = '#0c4a6e';

          // Add user selection as a message
          addUserMessage(opt.label + ' chart');

          // Resend with chart type prefix, preserving original prompt filters
          var newPrompt = 'Chart type: ' + opt.value + '. ' + originalPrompt;
          var newUi = addBotMessage();
          newUi.pre.textContent = 'Generating ' + opt.label + ' chart...';

          var headers = { 'Content-Type': 'application/json' };
          if (sessionId) headers['X-Session-ID'] = sessionId;

          fetch('/ai/chart', {
            method: 'POST',
            headers: headers,
            body: JSON.stringify({ prompt: newPrompt })
          }).then(function(resp) {
            updateSessionFromResponse(resp);
            if (!resp.ok) {
              return handleErrorResponse(newUi, resp, 'I couldn\'t generate that chart. Please try a different chart type.');
            }
            return resp.json().then(function(data) { renderChart(newUi, data, sendBtn); });
          }).catch(function(err) {
            showBotError(newUi, null, 'The connection failed. Please try again.');
          });
        };
        optionsDiv.appendChild(btn);
      })(data.options[i]);
    }

    if (data.context) {
      var ctx = createEl('div', 'meta', ui.msg);
      ctx.textContent = data.context;
    }
  }

  // Display mode: parse SSE events and render progressively
  function sendAsStream(text) {
    var ui = addBotMessage();
    var rowCount = 0;
    var buffer = '';

    var headers = { 'Content-Type': 'application/json' };
    if (sessionId) headers['X-Session-ID'] = sessionId;

    fetch('/ai/request', {
      method: 'POST',
      headers: headers,
      body: JSON.stringify({ prompt: text })
    }).then(function(response) {
      updateSessionFromResponse(response);
      if (!response.ok) {
        return handleErrorResponse(ui, response, 'I couldn\'t process your request. Try rephrasing with a report type and date range — for example, "Show me revenue for last quarter."');
      }

      var reader = response.body.getReader();
      var decoder = new TextDecoder();

      function read() {
        return reader.read().then(function(result) {
          if (result.done) {
            var events = parseSSE(buffer);
            for (var j = 0; j < events.length; j++) {
              if (events[j].trim()) { rowCount++; ui.pre.textContent += events[j] + '\n'; }
            }
            if (rowCount === 0) ui.pre.textContent = '(No data returned)';
            var meta = createEl('div', 'meta', ui.msg);
            meta.textContent = rowCount + ' rows received';
            ui.cursor.remove();
            sendBtn.disabled = false;
            promptEl.focus();
            chatEl.scrollTop = chatEl.scrollHeight;
            return;
          }

          var chunk = decoder.decode(result.value, { stream: true });
          buffer += chunk;

          var parts = buffer.split('\n\n');
          buffer = parts.pop() || '';

          for (var i = 0; i < parts.length; i++) {
            var events = parseSSE(parts[i]);
            for (var j = 0; j < events.length; j++) {
              if (events[j].trim()) {
                rowCount++;
                ui.pre.textContent += events[j] + '\n';
              }
            }
          }
          chatEl.scrollTop = chatEl.scrollHeight;
          return read();
        });
      }
      return read();
    }).catch(function(err) {
      if (err.message === '__handled__') return; // error already displayed
      showBotError(ui, null, 'The connection failed. Please check your network and try again.');
    });
  }

  // Download mode: consume full SSE, strip data: prefix, trigger file download
  function sendAsDownload(text) {
    addUserMessage('Downloading report...');
    var ui = addBotMessage();

    var headers = { 'Content-Type': 'application/json' };
    if (sessionId) headers['X-Session-ID'] = sessionId;

    fetch('/ai/request', {
      method: 'POST',
      headers: headers,
      body: JSON.stringify({ prompt: text })
    }).then(function(response) {
      updateSessionFromResponse(response);
      if (!response.ok) {
        return handleErrorResponse(ui, response, 'I couldn\'t process your request. Try rephrasing with a report type and date range — for example, "Show me revenue for last quarter."');
      }

      return response.text().then(function(rawText) {
        var events = parseSSE(rawText);
        var filename = 'report.csv';
        var dataStart = 0;
        if (events.length > 0 && events[0].indexOf('.') !== -1 && events[0].indexOf(',') === -1) {
          filename = events[0];
          dataStart = 1;
        }

        var content = events.slice(dataStart).join('\n');
        var blob = new Blob([content], { type: 'text/csv' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        ui.cursor.remove();
        var meta = createEl('div', 'meta', ui.msg);
        meta.textContent = 'Downloaded: ' + filename + ' (' + (blob.size / 1024).toFixed(1) + ' KB)';
        sendBtn.disabled = false;
        promptEl.focus();
        chatEl.scrollTop = chatEl.scrollHeight;
      });
    }).catch(function(err) {
      if (err.message === '__handled__') return; // error already displayed
      ui.pre.textContent = 'The download failed: ' + (err.message || 'unknown error') + '. Please try again.';
      ui.cursor.remove();
      sendBtn.disabled = false;
      promptEl.focus();
    });
  }

  // Event listeners
  sendBtn.addEventListener('click', sendPrompt);
  promptEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendPrompt();
    }
  });

  promptEl.addEventListener('input', function() {
    promptEl.style.height = 'auto';
    promptEl.style.height = Math.min(promptEl.scrollHeight, 120) + 'px';
  });

  document.getElementById('btn-history').addEventListener('click', openHistoryPanel);
  document.getElementById('btn-close-history').addEventListener('click', closeHistoryPanel);
  historyOverlay.addEventListener('click', closeHistoryPanel);
  document.getElementById('btn-clear').addEventListener('click', clearSession);

  // Initialize
  initSession();
  checkStatus();
  setInterval(checkStatus, 30000);
  setInterval(checkSessionStatus, 60000); // Check session every minute

})();
</script>

</body>
</html>
