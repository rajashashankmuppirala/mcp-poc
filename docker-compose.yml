services:
  domain-api:
    build: ./domain-api
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker

  mcp-server:
    build: ./mcp-server
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DOMAIN_API_URL=http://domain-api:8082
    depends_on:
      - domain-api

  ops-mcp-server:
    build: ./ops-mcp-server
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker

  ai-gateway:
    build: ./report-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - LLM_ENDPOINT=${LLM_ENDPOINT:-https://api.openai.com/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - MCP_SERVER_URL=http://mcp-server:8081
      - OPS_MCP_SERVER_URL=http://ops-mcp-server:8083
    depends_on:
      - mcp-server
      - ops-mcp-server

  mock-llm:
    image: alpine:3.20
    command: >
      sh -c 'echo "Mock LLM — use LLM_PROVIDER=mock to enable built-in mock" && sleep infinity'
    profiles:
      - mock
    restart: unless-stopped
